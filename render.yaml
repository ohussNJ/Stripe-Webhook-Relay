services:
  - type: web
    name: hookrelay
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hookrelay-db
          property: connectionString
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: ""

databases:
  - name: hookrelay-db
    plan: free
    databaseName: hookrelay
    user: hookrelay
