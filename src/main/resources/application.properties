# Server
server.port=8080

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Virtual threads (Java 21)
spring.threads.virtual.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,prometheus,metrics
management.endpoint.prometheus.enabled=true

# Stripe
hookrelay.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

# Worker
hookrelay.worker.thread-count=4
hookrelay.worker.poll-interval-ms=1000
hookrelay.worker.http-timeout-ms=10000

# Retry
hookrelay.retry.max-attempts=5
hookrelay.retry.base-delay-ms=30000
hookrelay.retry.jitter-factor=0.25
